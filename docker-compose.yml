services:
  mongo:
    image: mongo:7.0
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
    container_name: prismart-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: prismart

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    image: prismart-api
    build:
      context: .
      dockerfile: Dockerfile

    container_name: prismart
    restart: unless-stopped

    depends_on:
      - mongo

    ports:
      - "${API_PORT:-3000}:3000"

    environment:
      API_PORT: ${API_PORT:-3000}
      MONGO_URI: ${MONGO_URI}

    volumes:
      - .:/app
      - ./node_modules:/app/node_modules

volumes:
  mongo_data:
